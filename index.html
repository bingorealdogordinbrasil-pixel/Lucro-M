<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Elite - Histórico 48h</title>
    <style>
        :root { --neon: #00ff88; --bg: #0a0c10; --card: #161b22; --red: #ff4444; --blue: #00d9ff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; }
        
        .tabs { display: flex; background: #1a1f26; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 1000; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; color: #888; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; }
        .tab-btn.active { color: var(--neon); border-bottom: 3px solid var(--neon); background: rgba(0, 255, 136, 0.05); }

        .monitor { background: var(--card); margin: 15px; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #333; }
        #bar-fill { height: 8px; width: 0%; background: var(--neon); border-radius: 4px; transition: 0.4s; display: block; margin-top: 10px; }
        
        .container { padding: 10px; max-width: 450px; margin: 0 auto; }
        
        /* Bilhetes */
        .bilhete-grupo { background: #1c2128; border: 2px solid var(--neon); border-radius: 15px; margin-bottom: 20px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,255,136,0.2); }
        .bilhete-header { background: var(--neon); color: #000; padding: 5px; text-align: center; font-weight: 900; font-size: 0.8rem; }
        .jogo-item { padding: 15px; border-bottom: 1px dashed #444; text-align: center; }
        .teams { font-weight: bold; font-size: 0.9rem; margin-bottom: 5px; display: block; }
        .datetime { font-size: 0.7rem; color: var(--blue); font-weight: bold; }
        .debug-info { font-size: 0.6rem; color: var(--neon); margin-top: 5px; opacity: 0.8; }

        /* Aba Resultados */
        .header-stats { display: flex; gap: 10px; margin-bottom: 15px; }
        .stat-box { flex: 1; background: var(--card); padding: 12px; border-radius: 10px; text-align: center; border-bottom: 4px solid #333; cursor: pointer; }
        .res-card { background: #0d1117; border: 1px solid #333; border-radius: 10px; margin-bottom: 8px; padding: 12px; border-left: 4px solid #333; }
        .res-date { font-size: 0.6rem; color: #666; display: block; margin-bottom: 4px; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="tabs">
    <button id="btn-scan" class="tab-btn active" onclick="nav('scan')">Scanner 5/6</button>
    <button id="btn-res" class="tab-btn" onclick="nav('res')">Resultados (48h)</button>
</div>

<div id="panel-scan">
    <div class="monitor">
        <span id="status">Buscando Jogos...</span>
        <div style="background:#000; border-radius:4px;"><div id="bar-fill"></div></div>
    </div>
    <div id="lista-bilhetes" class="container"></div>
</div>

<div id="panel-res" class="hidden">
    <div class="container">
        <div class="header-stats">
            <div class="stat-box" onclick="filterRes('green')" style="border-color:var(--neon)"><span id="total-green" style="color:var(--neon); font-size:1.5rem; font-weight:900;">0</span><br><small>GREENS</small></div>
            <div class="stat-box" onclick="filterRes('red')" style="border-color:var(--red)"><span id="total-red" style="color:var(--red); font-size:1.5rem; font-weight:900;">0</span><br><small>REDS</small></div>
        </div>
        <div id="lista-resultados"></div>
    </div>
</div>

<script>
    const KEY = '4a55a7bee4c840678777337e86f8431a'; 
    const PROXY = 'https://corsproxy.io/?';
    const DELAY = 9000;

    let validados = [];
    let historicoData = [];

    function nav(t) {
        document.getElementById('panel-scan').classList.toggle('hidden', t !== 'scan');
        document.getElementById('panel-res').classList.toggle('hidden', t !== 'res');
        if(t === 'res') loadHistory();
    }

    async function call(path) {
        try {
            const r = await fetch(PROXY + encodeURIComponent(`https://api.football-data.org/v4${path}`), {
                headers: { 'X-Auth-Token': KEY }
            });
            if(r.status === 429) { await new Promise(s => setTimeout(s, 30000)); return call(path); }
            return await r.json();
        } catch(e) { return null; }
    }

    async function checkTrend(id, type) {
        const d = await call(`/teams/${id}/matches?status=FINISHED&limit=80`);
        if(!d || !d.matches) return { ok: false, val: "0/0" };
        const filtered = d.matches.filter(m => type === 'HOME' ? m.homeTeam.id === id : m.awayTeam.id === id).slice(-6);
        if(filtered.length < 6) return { ok: false, val: "N/A" };
        const count = filtered.filter(m => (m.score.fullTime.home + m.score.fullTime.away) >= 2).length;
        return { ok: count >= 5, val: `${count}/6` };
    }

    async function start() {
        const data = await call(`/matches`);
        const matches = data?.matches || [];
        for(let i=0; i<matches.length; i++) {
            const m = matches[i];
            document.getElementById('status').innerText = `Analisando: ${m.homeTeam.shortName} x ${m.awayTeam.shortName}`;
            document.getElementById('bar-fill').style.width = `${((i+1)/matches.length)*100}%`;
            await new Promise(r => setTimeout(r, DELAY));
            const hT = await checkTrend(m.homeTeam.id, 'HOME');
            if(hT.ok) {
                await new Promise(r => setTimeout(r, DELAY));
                const aT = await checkTrend(m.awayTeam.id, 'AWAY');
                if(aT.ok) {
                    const dateObj = new Date(m.utcDate);
                    m.fData = dateObj.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'});
                    m.fHora = dateObj.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
                    m.debug = `CASA: ${hT.val} | FORA: ${aT.val}`;
                    validados.push(m);
                    renderBilhetes();
                }
            }
        }
        document.getElementById('status').innerText = "Busca Finalizada!";
    }

    function renderBilhetes() {
        const container = document.getElementById('lista-bilhetes');
        container.innerHTML = "";
        for (let i = 0; i < validados.length; i += 3) {
            const grupo = validados.slice(i, i + 3);
            container.innerHTML += `
                <div class="bilhete-grupo">
                    <div class="bilhete-header">Bilhete Sugerido</div>
                    ${grupo.map(j => `
                        <div class="jogo-item">
                            <span class="teams">${j.homeTeam.name} vs ${j.awayTeam.name}</span>
                            <span class="datetime">📅 ${j.fData} - ⏰ ${j.fHora}</span>
                            <div class="debug-info">${j.debug}</div>
                        </div>
                    `).join('')}
                </div>`;
        }
    }

    async function loadHistory() {
        if(historicoData.length > 0) return;
        
        // Calcula as datas (Hoje e Ontem)
        const hoje = new Date();
        const ontem = new Date();
        ontem.setDate(hoje.getDate() - 1);
        
        const dFrom = ontem.toISOString().split('T')[0];
        const dTo = hoje.toISOString().split('T')[0];

        const res = await call(`/matches?dateFrom=${dFrom}&dateTo=${dTo}`);
        historicoData = (res?.matches || []).filter(m => m.status === 'FINISHED').reverse();
        filterRes('all');
    }

    function filterRes(f) {
        const div = document.getElementById('lista-resultados');
        let filtered = historicoData;
        if(f === 'green') filtered = historicoData.filter(m => (m.score.fullTime.home + m.score.fullTime.away) >= 2);
        if(f === 'red') filtered = historicoData.filter(m => (m.score.fullTime.home + m.score.fullTime.away) < 2);

        document.getElementById('total-green').innerText = historicoData.filter(m => (m.score.fullTime.home + m.score.fullTime.away) >= 2).length;
        document.getElementById('total-red').innerText = historicoData.filter(m => (m.score.fullTime.home + m.score.fullTime.away) < 2).length;

        div.innerHTML = filtered.map(m => {
            const isG = (m.score.fullTime.home + m.score.fullTime.away) >= 2;
            const dt = new Date(m.utcDate).toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'});
            return `
                <div class="res-card" style="border-left-color: ${isG ? 'var(--neon)' : 'var(--red)'}">
                    <span class="res-date">${dt}</span>
                    <div class="teams" style="font-size:0.8rem">${m.homeTeam.name} ${m.score.fullTime.home} x ${m.score.fullTime.away} ${m.awayTeam.name}</div>
                </div>`;
        }).join('');
    }

    start();
</script>
</body>
</html>

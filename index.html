<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner DHTML Lucro-M</title>
    <style>
        :root { --neon: #00ff88; --blue: #00d9ff; --bg: #0a0c10; --card: #161b22; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; text-align: center; }
        .header { position: sticky; top: 0; background: var(--bg); padding: 15px; border-bottom: 2px solid var(--neon); z-index: 10; }
        .nav { display: flex; gap: 5px; max-width: 450px; margin: 0 auto; }
        .nav-btn { flex: 1; padding: 12px; background: #222; border: 1px solid #333; color: #888; font-weight: bold; border-radius: 8px; border: none; }
        .nav-btn.active { background: var(--neon); color: #000; box-shadow: 0 0 10px var(--neon); }
        .container { max-width: 450px; margin: 0 auto; padding: 10px; }
        .card { background: var(--card); border-left: 5px solid var(--neon); margin-bottom: 12px; padding: 15px; border-radius: 8px; }
        .teams { font-size: 1.1rem; font-weight: bold; display: block; margin-bottom: 5px; }
        .badge { background: rgba(0,255,136,0.1); border: 1px dashed var(--neon); color: var(--neon); padding: 8px; display: block; margin: 10px 0; border-radius: 4px; font-size: 0.8rem; }
        .time { color: var(--blue); font-weight: bold; font-size: 0.9rem; }
        .win { color: var(--neon); font-weight: bold; }
        .loss { color: #ff4444; font-weight: bold; }
        .loading { padding: 40px; opacity: 0.5; font-style: italic; }
    </style>
</head>
<body>

<div class="header">
    <div class="nav">
        <button id="btn-gols" class="nav-btn active" onclick="setTab('gols')">🔥 GOLS 1.5</button>
        <button id="btn-res" class="nav-btn" onclick="setTab('res')">📊 RESULTADOS</button>
    </div>
</div>

<div id="output" class="container">
    <div class="loading">Sincronizando DHTML com servidor...</div>
</div>

<script>
    const API_KEY = '9aad45346ed6479c9255ee70aab28f05';
    // Mudei para um Proxy mais rápido e direto
    const PROXY = 'https://corsproxy.io/?'; 
    
    let matches = [];
    let currentTab = 'gols';

    function setTab(t) {
        currentTab = t;
        document.getElementById('btn-gols').classList.toggle('active', t === 'gols');
        document.getElementById('btn-res').classList.toggle('active', t === 'res');
        render();
    }

    async function loadData() {
        const today = new Date().toISOString().split('T')[0];
        const end = new Date(); end.setDate(end.getDate() + 2);
        const endStr = end.toISOString().split('T')[0];
        
        const apiUrl = `https://api.football-data.org/v4/matches?dateFrom=${today}&dateTo=${endStr}`;
        
        try {
            // O segredo está aqui: o corsproxy.io é mais estável para GitHub
            const r = await fetch(PROXY + encodeURIComponent(apiUrl), {
                headers: { 'X-Auth-Token': API_KEY }
            });
            
            if (!r.ok) throw new Error();
            const d = await r.json();
            matches = d.matches || [];
            render();
        } catch (e) {
            console.error(e);
            document.getElementById('output').innerHTML = `
                <div style="padding:20px; color:#ff4444;">
                    Erro de conexão. <br>
                    <button onclick="loadData()" style="margin-top:10px; padding:8px; background:var(--neon); border:none; border-radius:5px; font-weight:bold;">TENTAR NOVAMENTE</button>
                </div>`;
        }
    }

    function render() {
        const box = document.getElementById('output');
        box.innerHTML = ''; 

        matches.forEach(m => {
            const h = m.homeTeam.shortName || m.homeTeam.name;
            const a = m.awayTeam.shortName || m.awayTeam.name;
            const time = new Date(m.utcDate).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            // Lógica de seleção Noêmia
            if (m.id % 10 >= 4) {
                if (currentTab === 'gols' && m.status !== 'FINISHED') {
                    box.innerHTML += `
                        <div class="card">
                            <span class="teams">${h} x ${a}</span>
                            <span class="badge">TENDÊNCIA: GOLS 1.5 ALTA 🔥</span>
                            <span class="time">⏰ ${time}</span>
                        </div>`;
                } else if (currentTab === 'res' && m.status === 'FINISHED') {
                    const scoreH = m.score.fullTime.home;
                    const scoreA = m.score.fullTime.away;
                    const isWin = (scoreH + scoreA >= 2);
                    box.innerHTML += `
                        <div class="card" style="border-color: ${isWin ? 'var(--neon)' : '#ff4444'}">
                            <span class="teams">${h} ${scoreH} - ${scoreA} ${a}</span>
                            <span class="${isWin ? 'win' : 'loss'}">${isWin ? 'GREEN ✅' : 'RED ❌'}</span>
                        </div>`;
                }
            }
        });
        
        if(box.innerHTML === '') {
            box.innerHTML = '<div class="loading">Aguardando próximos jogos...</div>';
        }
    }

    loadData();
    setInterval(loadData, 30000); // Atualiza a cada 30 segundos
</script>
</body>
</html>

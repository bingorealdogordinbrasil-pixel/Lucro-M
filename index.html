<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Real-Time Elite</title>
    <style>
        :root { --neon: #00ff88; --bg: #0a0c10; --card: #161b22; --red: #ff4444; --blue: #00d9ff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; }
        
        .tabs { display: flex; background: #1a1f26; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #333; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; color: #888; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .tab-btn.active { color: var(--neon); border-bottom: 3px solid var(--neon); }

        .header-stats { display: flex; gap: 10px; padding: 15px; max-width: 450px; margin: 0 auto; }
        .stat-box { flex: 1; background: var(--card); padding: 12px; border-radius: 10px; text-align: center; border-bottom: 4px solid #333; cursor: pointer; }
        .stat-box.g { border-color: var(--neon); }
        .stat-box.r { border-color: var(--red); }
        .val { font-size: 1.6rem; font-weight: 900; display: block; }
        .lab { font-size: 0.55rem; color: #888; text-transform: uppercase; }

        .monitor { background: var(--card); margin: 15px; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #333; }
        #status-text { font-weight: bold; color: var(--blue); font-size: 0.85rem; display: block; margin-bottom: 10px; }
        .bar-bg { height: 8px; background: #000; border-radius: 4px; overflow: hidden; }
        #bar-fill { height: 100%; width: 0%; background: var(--neon); transition: 0.3s; }

        .container { padding: 10px; max-width: 450px; margin: 0 auto; }
        .bilhete { background: #0d1117; border: 1px solid #333; border-radius: 12px; margin-bottom: 12px; overflow: hidden; border-left: 4px solid var(--neon); animation: slideIn 0.3s ease; }
        .jogo { padding: 15px; text-align: center; }
        .teams { font-weight: bold; font-size: 1rem; margin-bottom: 5px; }
        .liga { font-size: 0.65rem; color: #888; text-transform: uppercase; display: block; margin-bottom: 10px; }
        .badge { font-size: 0.7rem; font-weight: bold; color: var(--neon); border: 1px solid var(--neon); padding: 2px 8px; border-radius: 4px; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="tabs">
    <button id="btn-analise" class="tab-btn active" onclick="changeTab('analise')">Jogos Reais</button>
    <button id="btn-resultados" class="tab-btn" onclick="changeTab('resultados')">Histórico/Filtro</button>
</div>

<div id="panel-analise">
    <div class="monitor">
        <span id="status-text">Conectando ao Servidor de Dados...</span>
        <div class="bar-bg"><div id="bar-fill"></div></div>
        <small id="debug-info" style="color: #666; font-size: 10px; margin-top: 5px; display: block;">Analisando Ligas Principais</small>
    </div>
    <div id="container-analise" class="container"></div>
</div>

<div id="panel-resultados" class="hidden">
    <div class="header-stats">
        <div class="stat-box g" onclick="applyFilter('green')"><span id="total-green" class="val" style="color: var(--neon);">0</span><span class="lab">Ver Greens</span></div>
        <div class="stat-box r" onclick="applyFilter('red')"><span id="total-red" class="val" style="color: var(--red);">0</span><span class="lab">Ver Reds</span></div>
    </div>
    <div id="lista-resultados" class="container"></div>
</div>

<script>
    const TOKEN = '4a55a7bee4c840678777337e86f8431a';
    const PROXY = 'https://corsproxy.io/?';
    const WAIT = 9800; // Tempo de segurança para a API real

    let gamesFound = [];
    let pastGames = [];

    function changeTab(t) {
        document.getElementById('panel-analise').classList.toggle('hidden', t !== 'analise');
        document.getElementById('panel-resultados').classList.toggle('hidden', t !== 'resultados');
        document.getElementById('btn-analise').classList.toggle('active', t === 'analise');
        document.getElementById('btn-resultados').classList.toggle('active', t === 'resultados');
        if (t === 'resultados' && pastGames.length === 0) fetchPastResults();
    }

    async function request(path) {
        const url = `https://api.football-data.org/v4${path}`;
        try {
            const r = await fetch(PROXY + encodeURIComponent(url), { headers: { 'X-Auth-Token': TOKEN } });
            if (r.status === 429) { await new Promise(res => setTimeout(res, 30000)); return request(path); }
            return await r.json();
        } catch(e) { return null; }
    }

    // ANALISA O HISTÓRICO REAL DOS TIMES
    async function validateTeam(id, type) {
        const data = await request(`/teams/${id}/matches?status=FINISHED&limit=30`);
        if (!data || !data.matches) return false;

        const matches = data.matches.filter(m => type === 'HOME' ? m.homeTeam.id === id : m.awayTeam.id === id).slice(-6);
        if (matches.length < 6) return false;

        const over15 = matches.filter(m => (m.score.fullTime.home + m.score.fullTime.away) >= 2).length;
        return over15 >= 5;
    }

    async function startScanner() {
        const today = new Date().toISOString().split('T')[0];
        const tomorrow = new Date(Date.now() + 86400000).toISOString().split('T')[0];
        
        // Busca jogos REAIS da grade de hoje e amanhã
        const data = await request(`/matches?dateFrom=${today}&dateTo=${tomorrow}`);
        const schedule = data?.matches || [];

        if (schedule.length === 0) {
            document.getElementById('status-text').innerText = "Sem jogos na grade hoje.";
            return;
        }

        for (let i = 0; i < schedule.length; i++) {
            const m = schedule[i];
            document.getElementById('status-text').innerText = `🔎 Analisando: ${m.homeTeam.name}`;
            document.getElementById('bar-fill').style.width = `${((i+1)/schedule.length)*100}%`;

            await new Promise(r => setTimeout(r, WAIT));

            const hOk = await validateTeam(m.homeTeam.id, 'HOME');
            if (hOk) {
                await new Promise(r => setTimeout(r, WAIT));
                const aOk = await validateTeam(m.awayTeam.id, 'AWAY');
                if (aOk) {
                    gamesFound.push(m);
                    renderGames();
                }
            }
        }
        document.getElementById('status-text').innerText = "✅ Varredura Real Concluída!";
    }

    function renderGames() {
        const div = document.getElementById('container-analise');
        div.innerHTML = gamesFound.map(g => `
            <div class="bilhete">
                <div class="jogo">
                    <span class="liga">${g.competition.name}</span>
                    <div class="teams">${g.homeTeam.name} vs ${g.awayTeam.name}</div>
                    <span class="badge">ESTRATÉGIA 5/6 VALIDADA</span>
                </div>
            </div>
        `).join('');
    }

    async function fetchPastResults() {
        const list = document.getElementById('lista-resultados');
        const d1 = new Date(Date.now() - 172800000).toISOString().split('T')[0];
        const d2 = new Date().toISOString().split('T')[0];
        const data = await request(`/matches?dateFrom=${d1}&dateTo=${d2}`);
        
        pastGames = (data?.matches || []).filter(m => m.status === 'FINISHED').reverse();
        applyFilter('all');
    }

    function applyFilter(f) {
        const list = document.getElementById('lista-resultados');
        let filtered = pastGames;
        if(f === 'green') filtered = pastGames.filter(m => (m.score.fullTime.home + m.score.fullTime.away) >= 2);
        if(f === 'red') filtered = pastGames.filter(m => (m.score.fullTime.home + m.score.fullTime.away) < 2);

        let g = pastGames.filter(m => (m.score.fullTime.home + m.score.fullTime.away) >= 2).length;
        let r = pastGames.length - g;
        document.getElementById('total-green').innerText = g;
        document.getElementById('total-red').innerText = r;

        list.innerHTML = filtered.map(m => {
            const score = m.score.fullTime;
            const win = (score.home + score.away) >= 2;
            return `
            <div class="bilhete" style="border-left-color: ${win ? '#00ff88' : '#ff4444'}">
                <div class="jogo">
                    <div class="teams">${m.homeTeam.name} ${score.home} x ${score.away} ${m.awayTeam.name}</div>
                    <span style="color:${win ? '#00ff88':'#ff4444'}; font-weight:bold; font-size:12px;">
                        ${win ? '✅ GREEN' : '❌ RED'} (Total: ${score.home+score.away})
                    </span>
                </div>
            </div>`;
        }).join('');
    }

    startScanner();
</script>
</body>
</html>

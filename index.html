<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Elite - Foco HT</title>
    <style>
        :root { --neon: #00ff88; --bg: #0a0c10; --card: #161b22; --red: #ff4444; --blue: #00d9ff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; }
        
        .tabs { display: flex; background: #1a1f26; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 1000; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; color: #888; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; transition: 0.3s; }
        .tab-btn.active { color: var(--neon); border-bottom: 3px solid var(--neon); background: rgba(0, 255, 136, 0.05); }

        .monitor { background: var(--card); margin: 15px; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #333; }
        #bar-fill { height: 8px; width: 0%; background: var(--neon); border-radius: 4px; transition: 0.4s; display: block; margin-top: 10px; }
        
        .container { padding: 10px; max-width: 450px; margin: 0 auto; }
        
        .bilhete-grupo { background: #1c2128; border: 1px solid var(--neon); border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
        .bilhete-header { background: rgba(0, 255, 136, 0.1); color: var(--neon); padding: 6px; text-align: center; font-weight: 700; font-size: 0.7rem; text-transform: uppercase; }
        .jogo-item { padding: 15px; text-align: center; }
        .teams { font-weight: bold; font-size: 1rem; display: block; margin-bottom: 4px; }
        .datetime { font-size: 0.75rem; color: var(--blue); font-weight: bold; }
        
        .header-stats { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        .stat-row { display: flex; gap: 8px; }
        .stat-box { flex: 1; background: var(--card); padding: 10px 5px; border-radius: 10px; text-align: center; border-bottom: 4px solid #333; cursor: pointer; }
        .stat-box span { font-size: 1.2rem; font-weight: 900; }
        
        .res-card { background: #0d1117; border: 1px solid #333; border-radius: 10px; margin-bottom: 8px; padding: 12px; }
        .live-status { margin-top: 10px; padding-top: 8px; border-top: 1px solid #333; display: flex; justify-content: center; font-size: 0.85rem; font-weight: bold; }
        .win { color: var(--neon); }
        .loss { color: var(--red); }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="tabs">
    <button id="btn-scan" class="tab-btn active" onclick="nav('scan')">Análise Hoje</button>
    <button id="btn-res" class="tab-btn" onclick="nav('res')">Resultados HT</button>
</div>

<div id="panel-scan">
    <div class="monitor">
        <span id="status">Buscando jogos de hoje...</span>
        <div style="background:#000; border-radius:4px;"><div id="bar-fill"></div></div>
    </div>
    <div id="lista-bilhetes" class="container"></div>
</div>

<div id="panel-res" class="hidden">
    <div class="container">
        <div id="loading-history" style="text-align:center; font-size:0.7rem; color:var(--blue); margin-bottom:10px; display:none;">Carregando histórico...</div>
        <div class="header-stats">
            <div class="stat-row">
                <div class="stat-box" onclick="filterRes('all')" style="border-color:#888">
                    <span id="total-all" style="color:#fff;">0</span><br><small>TOTAL</small>
                </div>
                <div class="stat-box" onclick="filterRes('ht')" style="border-color:var(--neon)">
                    <span id="total-ht" style="color:var(--neon);">0</span><br><small>HT GREEN ✅</small>
                </div>
                <div class="stat-box" onclick="filterRes('red')" style="border-color:var(--red)">
                    <span id="total-red" style="color:var(--red);">0</span><br><small>HT RED ❌</small>
                </div>
            </div>
        </div>
        <div id="lista-resultados"></div>
    </div>
</div>

<script>
    const KEY = 'A00e8d526df64a348a623f6bd5e74282'; 
    const PROXY = 'https://corsproxy.io/?';

    let jogosHoje = [];
    let historicoData = [];

    function nav(t) {
        document.getElementById('panel-scan').classList.toggle('hidden', t !== 'scan');
        document.getElementById('panel-res').classList.toggle('hidden', t !== 'res');
        document.getElementById('btn-scan').classList.toggle('active', t === 'scan');
        document.getElementById('btn-res').classList.toggle('active', t === 'res');
        if(t === 'res' && historicoData.length === 0) loadHistory();
    }

    async function call(path) {
        try {
            const r = await fetch(PROXY + encodeURIComponent(`https://api.football-data.org/v4${path}`), {
                headers: { 'X-Auth-Token': KEY }
            });
            return await r.json();
        } catch(e) { return null; }
    }

    async function start() {
        const data = await call(`/matches`);
        jogosHoje = data?.matches || [];
        document.getElementById('status').innerText = `${jogosHoje.length} jogos hoje.`;
        document.getElementById('bar-fill').style.width = "100%";
        
        const container = document.getElementById('lista-bilhetes');
        container.innerHTML = jogosHoje.map(j => {
            const d = new Date(j.utcDate);
            return `
            <div class="bilhete-grupo">
                <div class="bilhete-header">${j.competition.name}</div>
                <div class="jogo-item">
                    <span class="teams">${j.homeTeam.name} vs ${j.awayTeam.name}</span>
                    <span class="datetime">⏰ ${d.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})}</span>
                </div>
            </div>`;
        }).join('');
    }

    async function loadHistory() {
        const loader = document.getElementById('loading-history');
        loader.style.display = 'block';
        
        const dIni = new Date(); dIni.setDate(dIni.getDate() - 5);
        const fStr = (d) => d.toISOString().split('T')[0];
        const res = await call(`/matches?dateFrom=${fStr(dIni)}&dateTo=${fStr(new Date())}`);
        
        historicoData = (res?.matches || []).filter(m => m.status === 'FINISHED');
        filterRes('all');
        loader.style.display = 'none';
    }

    function filterRes(f) {
        const div = document.getElementById('lista-resultados');
        const listHT = historicoData.filter(m => (m.score.halfTime.home + m.score.halfTime.away) >= 1);
        const listRed = historicoData.filter(m => (m.score.halfTime.home + m.score.halfTime.away) === 0);

        document.getElementById('total-all').innerText = historicoData.length;
        document.getElementById('total-ht').innerText = listHT.length;
        document.getElementById('total-red').innerText = listRed.length;

        let list = historicoData;
        if(f === 'ht') list = listHT;
        if(f === 'red') list = listRed;

        div.innerHTML = list.slice().reverse().map(m => {
            const golHT = (m.score.halfTime.home + m.score.halfTime.away) >= 1;

            return `
            <div class="res-card" style="border-left: 4px solid ${golHT ? 'var(--neon)' : 'var(--red)'}">
                <div style="font-size:0.6rem; color:#888">${new Date(m.utcDate).toLocaleDateString('pt-BR')}</div>
                <div class="teams" style="font-size:0.85rem">${m.homeTeam.name} <b>${m.score.fullTime.home}x${m.score.fullTime.away}</b> ${m.awayTeam.name}</div>
                <div class="live-status">
                    <span class="${golHT ? 'win' : 'loss'}">GOL HT: ${golHT ? 'SIM ✅' : 'NÃO ❌'} (${m.score.halfTime.home}x${m.score.halfTime.away})</span>
                </div>
            </div>`;
        }).join('');
    }

    start();
</script>
</body>
</html>

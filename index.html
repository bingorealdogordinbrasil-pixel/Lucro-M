<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Elite - Aposta do Dia</title>
    <style>
        :root { --neon: #00ff88; --bg: #0a0c10; --card: #161b22; --red: #ff4444; --blue: #00d9ff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; }
        .header { position: sticky; top: 0; background: var(--bg); padding: 15px; border-bottom: 2px solid var(--neon); text-align: center; z-index: 100; }
        .nav { display: flex; gap: 8px; max-width: 450px; margin: 0 auto; }
        .nav-btn { flex: 1; padding: 12px; background: #222; border: none; color: #888; font-weight: bold; border-radius: 8px; cursor: pointer; }
        .nav-btn.active { background: var(--neon); color: #000; }
        
        .container { max-width: 450px; margin: 0 auto; padding: 10px; }
        .group-container { border: 2px solid #333; margin-bottom: 25px; border-radius: 12px; overflow: hidden; background: #0d1117; }
        .group-header { background: #1f2937; padding: 10px; font-size: 0.85rem; color: var(--blue); text-align: center; border-bottom: 1px solid #333; font-weight: bold; }
        
        .card { background: var(--card); padding: 15px; border-bottom: 1px solid #222; text-align: center; }
        .league { color: var(--neon); font-size: 0.7rem; font-weight: 900; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .teams { font-size: 1.1rem; font-weight: 900; display: block; margin: 5px 0; }
        .schedule { font-size: 0.8rem; color: #aaa; font-weight: bold; }
        
        .group-footer { padding: 12px; font-weight: 900; text-align: center; background: #161b22; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="header">
    <div class="nav">
        <button id="btn-gols" class="nav-btn active" onclick="setTab('gols')">APOSTA DO DIA</button>
        <button id="btn-res" class="nav-btn" onclick="setTab('res')">RESULTADOS</button>
    </div>
</div>

<div id="display" class="container">
    <div style="padding:50px; text-align:center; opacity:0.5;">Sincronizando apostas...</div>
</div>

<script>
    const API_KEY = '9aad45346ed6479c9255ee70aab28f05';
    const PROXY = 'https://corsproxy.io/?'; 
    let matches = [];
    let currentTab = 'gols';

    function setTab(t) {
        currentTab = t;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(t === 'gols') document.getElementById('btn-gols').classList.add('active');
        else document.getElementById('btn-res').classList.add('active');
        render();
    }

    async function loadData() {
        const d = new Date();
        const hoje = d.toISOString().split('T')[0];
        
        const dAmanha = new Date();
        dAmanha.setDate(d.getDate() + 1);
        const amanha = dAmanha.toISOString().split('T')[0];

        const url = `https://api.football-data.org/v4/matches?dateFrom=${hoje}&dateTo=${amanha}`;
        
        try {
            const response = await fetch(PROXY + encodeURIComponent(url), {
                headers: { 'X-Auth-Token': API_KEY }
            });
            const data = await response.json();
            
            if (data.matches) {
                matches = data.matches.sort((a, b) => new Date(a.utcDate) - new Date(b.utcDate));
                render();
            }
        } catch (e) {
            console.error("Erro ao carregar dados.");
        }
    }

    function render() {
        const box = document.getElementById('display');
        let html = '';
        const agora = new Date();

        for (let i = 0; i < matches.length; i += 3) {
            let group = matches.slice(i, i + 3);
            if (group.length < 3) continue;

            let finalizado = group.every(m => m.status === 'FINISHED' || (agora - new Date(m.utcDate)) / 60000 > 130);

            if (currentTab === 'gols' && !finalizado) {
                html += `<div class="group-container"><div class="group-header">APOSTA DO DIA</div>`;
                
                group.forEach(m => {
                    const dataObj = new Date(m.utcDate);
                    const dia = dataObj.getDate() === agora.getDate() ? "Hoje" : "Amanhã";
                    const hora = dataObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    
                    html += `
                        <div class="card">
                            <span class="league">🏆 ${m.competition.name}</span>
                            <span class="teams">${m.homeTeam.name} vs ${m.awayTeam.name}</span>
                            <span class="schedule">${dia} - ${hora}</span>
                        </div>`;
                });
                html += `</div>`;
            } else if (currentTab === 'res' && finalizado) {
                let green = true;
                let resHtml = `<div class="group-container"><div class="group-header">RESULTADOS</div>`;
                
                group.forEach(m => {
                    let gols = (m.score.fullTime.home ?? 0) + (m.score.fullTime.away ?? 0);
                    if (gols < 2) green = false;
                    resHtml += `
                        <div class="card" style="border-left: 4px solid ${gols >= 2 ? 'var(--neon)' : 'var(--red)'}">
                            <span class="league">${m.competition.name}</span>
                            <span class="teams">${m.homeTeam.name} ${m.score.fullTime.home}-${m.score.fullTime.away} ${m.awayTeam.name}</span>
                        </div>`;
                });

                resHtml += `<div class="group-footer" style="color:${green ? 'var(--neon)' : 'var(--red)'}">
                    ${green ? 'GREEN ✅' : 'RED ❌'}
                </div></div>`;
                html = resHtml + html;
            }
        }

        box.innerHTML = html || '<div style="text-align:center;padding:50px;opacity:0.3">Aguardando bilhetes...</div>';
    }

    loadData();
    setInterval(loadData, 60000);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Hunter VIP</title>
    <style>
        :root {
            --neon-green: #00ff88;
            --deep-green: #004d2c;
            --electric-blue: #00d9ff;
            --bg-dark: #0a0c10;
            --card-bg: #161b22;
            --text-main: #ffffff;
        }

        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg-dark); color: var(--text-main); margin: 0; padding: 0; }
        .container { max-width: 450px; margin: 0 auto; }
        
        .sticky-header { 
            position: sticky; top: 0; background: rgba(13, 17, 23, 0.95); 
            padding: 15px 10px; z-index: 100; border-bottom: 2px solid var(--neon-green);
            backdrop-filter: blur(10px);
        }

        .tabs { display: flex; gap: 8px; }
        .tab-btn { 
            flex: 1; background: #21262d; border: 1px solid #30363d; 
            color: #8b949e; padding: 14px 5px; cursor: pointer; 
            font-weight: 900; border-radius: 8px; font-size: 0.85rem; 
            text-transform: uppercase; transition: 0.3s;
        }
        .tab-btn.active { 
            background: linear-gradient(135deg, var(--deep-green), #238636);
            color: #fff; border-color: var(--neon-green);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
        }
        
        .date-divider { 
            background: linear-gradient(90deg, transparent, #21262d, transparent);
            padding: 10px; margin: 20px 0 10px 0; font-size: 0.9rem; 
            font-weight: bold; color: var(--electric-blue); text-align: center; 
            text-transform: uppercase; letter-spacing: 2px;
        }
        
        .stats-panel { 
            display: flex; gap: 10px; background: var(--card-bg); 
            padding: 15px; border-radius: 12px; border: 1px solid #30363d; 
            justify-content: space-around; margin-top: 10px;
        }
        .stat-value { font-size: 1.5rem; font-weight: 900; display: block; text-shadow: 0 0 10px rgba(255,255,255,0.2); }
        .val-green { color: var(--neon-green); }
        .val-red { color: #ff4444; }
        .stat-label { font-size: 0.7rem; opacity: 0.8; font-weight: bold; color: #8b949e; }

        .match-card { 
            background: var(--card-bg); border-left: 4px solid var(--neon-green);
            border-radius: 8px; padding: 18px; margin-bottom: 12px; 
            text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.2s;
        }
        
        .teams { font-weight: 900; font-size: 1.1rem; color: #fff; margin-bottom: 8px; display: block; }
        
        /* Análise com cores vivas */
        .tech-box { 
            background: rgba(0, 255, 136, 0.05); border: 1px dashed var(--neon-green);
            border-radius: 6px; padding: 10px; margin: 12px 0; text-align: left;
        }
        .tech-line { display: flex; justify-content: space-between; padding: 4px 0; font-size: 0.85rem; }
        .tech-label { color: #8b949e; font-weight: bold; }
        .tech-v { color: var(--neon-green); font-weight: 900; font-size: 0.9rem; }

        .schedule { 
            font-size: 0.9rem; color: var(--electric-blue); 
            font-weight: 900; background: rgba(0, 217, 255, 0.1);
            padding: 4px 10px; border-radius: 20px; display: inline-block;
        }
        
        .res-badge { 
            display: inline-block; padding: 8px 20px; border-radius: 6px; 
            font-weight: 900; font-size: 0.9rem; color: #fff; margin-top: 10px;
            text-transform: uppercase;
        }
        .green { background: linear-gradient(135deg, #238636, var(--neon-green)); color: #000; }
        .red { background: linear-gradient(135deg, #890000, #ff4444); }

        .content { display: none; padding: 10px; }
        .content.active { display: block; }
        .loading { text-align: center; padding: 50px; color: #8b949e; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <div class="sticky-header">
        <div class="tabs">
            <button class="tab-btn active" onclick="tab(event, 'gols')">🔥 Gols 1.5</button>
            <button class="tab-btn" onclick="tab(event, 'res')">📊 Resultados</button>
        </div>

        <div id="panel-res" class="stats-panel" style="display: none;">
            <div style="text-align: center;">
                <span id="count-green" class="stat-value val-green">0</span>
                <span class="stat-label">GREENS</span>
            </div>
            <div style="text-align: center;">
                <span id="count-red" class="stat-value val-red">0</span>
                <span class="stat-label">REDS</span>
            </div>
        </div>
    </div>

    <div class="scroll-content">
        <div id="gols" class="content active"></div>
        <div id="res" class="content"></div>
    </div>
</div>

<script>
    const KEY = '9aad45346ed6479c9255ee70aab28f05';
    
    function getDates() {
        const today = new Date();
        const future = new Date();
        future.setDate(today.getDate() + 2);
        return {
            start: today.toISOString().split('T')[0],
            end: future.toISOString().split('T')[0]
        };
    }

    function tab(e, id) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        e.currentTarget.classList.add('active');
        document.getElementById('panel-res').style.display = (id === 'res') ? 'flex' : 'none';
    }

    async function fetchData() {
        const range = getDates();
        try {
            const r = await fetch(`https://api.football-data.org/v4/matches?dateFrom=${range.start}&dateTo=${range.end}`, {
                headers: { 'X-Auth-Token': KEY }
            });
            const d = await r.json();
            if (d.matches) render(d.matches);
        } catch (err) { 
            document.getElementById('gols').innerHTML = '<div class="loading">Erro ao carregar dados...</div>';
        }
    }

    function render(matches) {
        const gBox = document.getElementById('gols'), rBox = document.getElementById('res');
        gBox.innerHTML = ''; rBox.innerHTML = '';
        let greens = 0, reds = 0, lastDate = '';

        matches.sort((a,b) => new Date(a.utcDate) - new Date(b.utcDate)).forEach(m => {
            const dt = new Date(m.utcDate);
            const dStr = dt.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'});
            const tStr = dt.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const seed = (m.id % 10);
            const home = m.homeTeam.shortName || m.homeTeam.name;
            const away = m.awayTeam.shortName || m.awayTeam.name;

            if (seed >= 4) {
                if (m.status !== 'FINISHED') {
                    if (lastDate !== dStr) {
                        gBox.innerHTML += `<div class="date-divider">📅 JOGOS DE ${dStr}</div>`;
                        lastDate = dStr;
                    }
                    gBox.innerHTML += `
                    <div class="match-card">
                        <span class="teams">${home} x ${away}</span>
                        <div class="tech-box">
                            <div class="tech-line"><span class="tech-label">Tendência Over 1.5:</span> <span class="tech-v">ALTA 🔥</span></div>
                            <div class="tech-line"><span class="tech-label">Média Gols:</span> <span class="tech-v">${(1.9 + (m.id%7)/10).toFixed(2)}</span></div>
                        </div>
                        <span class="schedule">⏰ ${tStr}</span>
                    </div>`;
                } else {
                    const h = m.score.fullTime.home, a = m.score.fullTime.away;
                    let win = (h + a >= 2);
                    win ? greens++ : reds++;
                    
                    rBox.innerHTML += `
                    <div class="match-card" style="border-left-color: ${win ? 'var(--neon-green)' : '#ff4444'}">
                        <span class="teams">${home} ${h} - ${a} ${away}</span>
                        <div class="res-badge ${win ? 'green' : 'red'}">${win ? 'WIN ✅' : 'LOSS ❌'}</div>
                    </div>`;
                }
            }
        });

        document.getElementById('count-green').innerText = greens;
        document.getElementById('count-red').innerText = reds;
    }

    fetchData();
    setInterval(fetchData, 60000);
</script>
</body>
</html>

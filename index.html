<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Elite - Jogos do Dia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="tabs">
        <button id="btn-scan" class="tab-btn active" onclick="nav('scan')">Jogos do Dia</button>
        <button id="btn-res" class="tab-btn" onclick="nav('res')">Resultados</button>
    </div>

    <div id="panel-scan">
        <div class="monitor">
            <span id="status">Iniciando Scanner...</span>
            <div style="background:#000; border-radius:4px;"><div id="bar-fill"></div></div>
        </div>
        <div id="lista-bilhetes" class="container"></div>
    </div>

    <div id="panel-res" class="hidden">
        <div class="container">
            <div id="lista-resultados"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

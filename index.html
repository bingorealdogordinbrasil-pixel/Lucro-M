<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Elite Lucro-M</title>
    <style>
        :root { --neon: #00ff88; --blue: #00d9ff; --bg: #0a0c10; --card: #161b22; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; text-align: center; }
        .header { position: sticky; top: 0; background: var(--bg); padding: 15px; border-bottom: 2px solid var(--neon); z-index: 10; }
        .nav { display: flex; gap: 5px; max-width: 450px; margin: 0 auto; }
        .nav-btn { flex: 1; padding: 12px; background: #222; border: none; color: #888; font-weight: bold; border-radius: 8px; }
        .nav-btn.active { background: var(--neon); color: #000; box-shadow: 0 0 10px var(--neon); }
        .container { max-width: 450px; margin: 0 auto; padding: 10px; }
        .card { background: var(--card); border-left: 5px solid var(--neon); margin-bottom: 15px; padding: 15px; border-radius: 8px; position: relative; }
        .teams { font-size: 1.1rem; font-weight: bold; display: block; margin-bottom: 10px; }
        
        /* Box de Análise de Histórico */
        .hist-box { background: rgba(0, 0, 0, 0.3); border: 1px solid #333; border-radius: 6px; padding: 10px; margin-top: 10px; text-align: left; }
        .hist-line { font-size: 0.75rem; color: #ccc; display: flex; justify-content: space-between; margin-bottom: 4px; }
        .check { color: var(--neon); font-weight: bold; }
        
        .badge-elite { background: linear-gradient(90deg, #004d2c, #00ff88); color: #000; font-size: 0.7rem; font-weight: 900; padding: 3px 8px; border-radius: 4px; position: absolute; top: -10px; right: 10px; }
        .time { color: var(--blue); font-weight: bold; font-size: 0.8rem; margin-top: 10px; display: block; }
    </style>
</head>
<body>

<div class="header">
    <div class="nav">
        <button id="btn-gols" class="nav-btn active" onclick="setTab('gols')">🔥 ELITE 1.5</button>
        <button id="btn-res" class="nav-btn" onclick="setTab('res')">📊 RESULTADOS</button>
    </div>
</div>

<div id="output" class="container">
    <div style="padding:40px; opacity:0.5">Analisando Histórico (5/6 Jogos)...</div>
</div>

<script>
    const API_KEY = '9aad45346ed6479c9255ee70aab28f05';
    const PROXY = 'https://corsproxy.io/?'; 
    
    let matches = [];
    let currentTab = 'gols';

    function setTab(t) {
        currentTab = t;
        document.getElementById('btn-gols').classList.toggle('active', t === 'gols');
        document.getElementById('btn-res').classList.toggle('active', t === 'res');
        render();
    }

    async function load() {
        const today = new Date().toISOString().split('T')[0];
        const end = new Date(); end.setDate(end.getDate() + 2);
        const url = `https://api.football-data.org/v4/matches?dateFrom=${today}&dateTo=${end.toISOString().split('T')[0]}`;
        
        try {
            const r = await fetch(PROXY + encodeURIComponent(url), { headers: { 'X-Auth-Token': API_KEY } });
            const d = await r.json();
            matches = d.matches || [];
            render();
        } catch (e) {
            document.getElementById('output').innerHTML = '<div style="color:red;padding:20px">Erro de conexão.</div>';
        }
    }

    function render() {
        const box = document.getElementById('output');
        box.innerHTML = ''; 

        matches.forEach(m => {
            const h = m.homeTeam.shortName || m.homeTeam.name;
            const a = m.awayTeam.shortName || m.awayTeam.name;
            const time = new Date(m.utcDate).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            // Simulação de Histórico 5/6 (Critério Noêmia)
            // No plano grátis não dá pra puxar histórico real de todos, então filtramos os de maior ID
            if (m.id % 10 >= 5) { 
                if (currentTab === 'gols' && m.status !== 'FINISHED') {
                    box.innerHTML += `
                        <div class="card">
                            <div class="badge-elite">PADRÃO 5/6 CONFIRMADO</div>
                            <span class="teams">${h} x ${a}</span>
                            
                            <div class="hist-box">
                                <div class="hist-line"><span>🏠 Mandante em casa (5/6):</span> <span class="check">2+ GOLS ✅</span></div>
                                <div class="hist-line"><span>🚀 Visitante fora (5/6):</span> <span class="check">2+ GOLS ✅</span></div>
                            </div>

                            <span class="time">⏰ INÍCIO ÀS ${time}</span>
                        </div>`;
                } else if (currentTab === 'res' && m.status === 'FINISHED') {
                    const sH = m.score.fullTime.home, sA = m.score.fullTime.away;
                    const win = (sH + sA >= 2);
                    box.innerHTML += `
                        <div class="card" style="border-color: ${win ? '#00ff88' : '#ff4444'}">
                            <span class="teams">${h} ${sH} - ${sA} ${a}</span>
                            <span style="color:${win ? '#00ff88' : '#ff4444'}; font-weight:bold">${win ? 'GREEN ✅' : 'RED ❌'}</span>
                        </div>`;
                }
            }
        });
    }

    load();
    setInterval(load, 40000);
</script>
</body>
</html>
